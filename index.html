<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#FFFFFF" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Daily" />
<meta name="description" content="Daily — your personal AI calorie, macro and workout tracker." />
<title>Daily — AI fitness tracker</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/icon.svg" />
<link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div id="app">
  <div class="scroll" id="screen"></div>
  <div class="fnav" id="fnav" style="display:none">
    <button data-tab="today" class="on"><span class="ic">🍽️</span>Diet</button>
    <button data-tab="train"><span class="ic">🏋️</span>Train</button>
    <button data-tab="streak"><span class="ic">🔥</span>Streak</button>
    <button data-tab="you"><span class="ic">👤</span>You</button>
  </div>
  <button class="fab" id="fab" style="display:none" aria-label="Add">+</button>
</div>
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"></div>

<!-- Supabase client (loaded from CDN; defines window.supabase) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- App config — paste your Supabase keys in js/config.js -->
<script src="js/config.js"></script>

<!-- App modules (classic scripts, load order matters; app.js is last) -->
<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/calc.js"></script>
<script src="js/cloud.js"></script>
<script src="js/ai.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/onboarding.js"></script>
<script src="js/screens.js"></script>
<script src="js/sheets.js"></script>
<script src="js/app.js"></script>
</body>
</html>
